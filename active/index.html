<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackhole</title>

    <script src="https://unpkg.com/@mercuryworkshop/bare-mux/dist/index.js"></script>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>

    <style>
      body {
        padding: 0;
        margin: 0;
        background-color: #000; 
        color: white;
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>

  <body>

    <div style="text-align: center; margin-top: 20vh;">
      <h1>Blackhole</h1>
      
      <form id="url-form">
        <input 
          type="text" 
          id="url-input" 
          placeholder="Search the web or enter URL..." 
          autocomplete="off"
          style="padding: 15px; width: 300px; border-radius: 8px; border: none;"
        />
      </form>
    </div>

 <script>
      // Force JS to wait until the HTML is fully loaded to prevent 'null' errors
      window.addEventListener('load', async () => {
          
          // --- 1. Menu Button Logic ---
          const optionsBtn = document.getElementById("options-btn");
          const overlay = document.getElementById("menu-overlay");
          
          if (optionsBtn && overlay) {
              optionsBtn.addEventListener("click", () => {
                  overlay.classList.toggle("active");
              });
          }

          // --- 2. Search Bar Logic ---
          const form = document.getElementById('url-form');
          const input = document.getElementById('url-input');

          if(form && input) {
              form.addEventListener('submit', (event) => {
                  event.preventDefault(); 
                  let url = input.value.trim();
                  if (!url) return;
                  
                  if (!url.includes('.') || url.includes(' ')) {
                      url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                  } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
                      url = 'https://' + url;
                  }
                  
                  // Passes the URL to Ultraviolet
                  window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
              });
          }

          // --- 3. The Proxy Engine Boot Sequence (Unmasked) ---
          
          // Connect to the local worker
          const connection = new BareMux.BareMuxConnection("/prxy/baremux/worker.js");
          
          // Use your LOCAL browser-safe bare.js file (containing the ESM module)
          await connection.setTransport("/prxy/baremux/bare.js", [__uv$config.bare]);
          console.log("BareMux transport connected locally!");

          // Register the Service Worker
          if ('serviceWorker' in navigator) {
              await navigator.serviceWorker.register('/sw.js', { scope: '/' });
              console.log("Service Worker installed.");
              
              await navigator.serviceWorker.ready;
              console.log("Engine Online and Ready!");
          }
      });
    </script>
  </body>
</html>
