<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackhole</title>

    <script src="/prxy/baremux/index.js"></script>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>

    <style>
      body {
        padding: 0;
        margin: 0;
        background-color: #000; 
        color: white;
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>

  <body>

    <div style="text-align: center; margin-top: 20vh;">
      <h1>Blackhole</h1>
      
      <form id="blackhole-form">
        <input 
          type="text" 
          id="blackhole-search" 
          placeholder="Search the web or enter URL..." 
          autocomplete="off"
          style="padding: 15px; width: 300px; border-radius: 8px; border: none;"
        />
      </form>
    </div>

<script>
      window.addEventListener('load', async () => {
          const form = document.getElementById('blackhole-form');
          const input = document.getElementById('blackhole-search');

          form.addEventListener('submit', (event) => {
              event.preventDefault(); 
              
              let url = input.value.trim();
              if (!url) return;
              
              if (!url.includes('.') || url.includes(' ')) {
                  url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
              } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
                  url = 'https://' + url;
              }

              window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
          });

          try {
              const connection = new BareMux.BareMuxConnection("/prxy/baremux/worker.js");
              
              await connection.setTransport("/prxy/baremux/bare.cjs", [__uv$config.bare]);
              console.log("BareMux pipeline connected.");
          } catch (err) {
              console.error("Failed to connect BareMux pipeline:", err);
          }

          if ('serviceWorker' in navigator) {
              try {
                  await navigator.serviceWorker.register('/sw.js', {
                      scope: '/' 
                  });
                  console.log("Service Worker installed globally.");
                  
                  await navigator.serviceWorker.ready;
                  console.log("Blackhole Engine Online and Ready!");
              } catch (err) {
                  console.error("Engine failed to boot:", err);
              }
          }
      });
    </script>
  </body>
</html>
