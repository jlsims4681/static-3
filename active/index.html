<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackhole</title>

    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>

    <style>
      body {
        padding: 0;
        margin: 0;
        background-color: #000; /* Blackhole theme placeholder */
        color: white;
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>

  <body>

    <div style="text-align: center; margin-top: 20vh;">
      <h1>Blackhole</h1>
      
      <form id="blackhole-form">
        <input 
          type="text" 
          id="blackhole-search" 
          placeholder="Search the web or enter URL..." 
          autocomplete="off"
          style="padding: 15px; width: 300px; border-radius: 8px; border: none;"
        />
      </form>
    </div>

<script>
      // Wait for the UV engine files to finish loading first
      window.addEventListener('load', () => {
          const form = document.getElementById('blackhole-form');
          const input = document.getElementById('blackhole-search');

          // 1. Boot up the Service Worker
          if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('/active/uv/uv.sw.js', {
                  scope: __uv$config.prefix
              }).then(() => {
                  console.log("Blackhole Engine Online.");
              }).catch(err => {
                  console.error("Engine failed to boot:", err);
              });
          }

          // 2. Listen for the Enter key on your search bar
          form.addEventListener('submit', async (event) => {
              // This line is what stops the page from reloading!
              event.preventDefault();
              
              let url = input.value.trim();
              if (!url) return;
              
              // Format the URL properly (Google search vs direct link)
              if (!url.includes('.') || url.includes(' ')) {
                  url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
              } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
                  url = 'https://' + url;
              }

              // Route the traffic through the Ultraviolet prefix
              window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
          });
      });
    </script>
  </body>
</html>
