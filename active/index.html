<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackhole</title>

    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>

    <style>
      body {
        padding: 0;
        margin: 0;
        background-color: #000; /* Blackhole theme placeholder */
        color: white;
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>

  <body>

    <div style="text-align: center; margin-top: 20vh;">
      <h1>Blackhole</h1>
      
      <form id="blackhole-form">
        <input 
          type="text" 
          id="blackhole-search" 
          placeholder="Search the web or enter URL..." 
          autocomplete="off"
          style="padding: 15px; width: 300px; border-radius: 8px; border: none;"
        />
      </form>
    </div>

<script>
      // Notice the "async" right here! This fixes your crash.
      window.addEventListener('load', async () => {
          const form = document.getElementById('blackhole-form');
          const input = document.getElementById('blackhole-search');

          // 1. Boot up the Service Worker and WAIT for it
          if ('serviceWorker' in navigator) {
              try {
                  await navigator.serviceWorker.register('/sw.js', {
                      scope: __uv$config.prefix
                  });
                  console.log("Service Worker installed.");
                  
                  // This halts everything until the engine is actively controlling the page
                  await navigator.serviceWorker.ready;
                  console.log("Blackhole Engine Online and Ready!");
              } catch (err) {
                  console.error("Engine failed to boot:", err);
              }
          }

          // 2. Listen for the Enter key
          form.addEventListener('submit', (event) => {
              event.preventDefault();
              
              let url = input.value.trim();
              if (!url) return;
              
              if (!url.includes('.') || url.includes(' ')) {
                  url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
              } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
                  url = 'https://' + url;
              }

              // Send it!
              window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
          });
      });
    </script>
  </body>
</html>
